[build]
  command = "cd frontend && npm ci && npm run build"
  publish = "frontend/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  CI = "true"

# Performance: Cache busting for assets with hash in filename
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Performance: Cache service worker but allow updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Performance: Cache HTML with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Performance: Enable compression
[[headers]]
  for = "/*"
  [headers.values]
    Content-Encoding = "gzip"

